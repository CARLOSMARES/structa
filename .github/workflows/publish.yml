name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.0)'
        required: false

jobs:
  # Publish structa-cli to npm
  publish-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-npm
        run: |
          cargo install cargo-npm
      
      - name: Build and publish CLI to npm
        run: |
          cd crates/structa-cli
          cargo npm publish --token ${{ secrets.NPM_TOKEN }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Publish @structa/runtime to npm
  publish-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@structa'
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./runtime
      
      - name: Build
        run: npm run build
        working-directory: ./runtime
      
      - name: Publish runtime to npm
        run: npm publish --access public
        working-directory: ./runtime
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
