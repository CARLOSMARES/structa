name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.8.1)'
        required: false
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@structa'
      
      - name: Install dependencies
        run: npm install --ignore-scripts
      
      - name: Publish @structa/http
        run: |
          cd packages/http
          npm install --legacy-peer-deps --ignore-scripts
          npm run build
          npm publish --access public --otp ${{ secrets.NPM_OTP }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Publish @structa/orm
        run: |
          cd packages/orm
          npm install --legacy-peer-deps --ignore-scripts
          npm run build
          npm publish --access public --otp ${{ secrets.NPM_OTP }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Publish @structa/validation
        run: |
          cd packages/validation
          npm install --legacy-peer-deps --ignore-scripts
          npm publish --access public --otp ${{ secrets.NPM_OTP }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Publish @structa/cache
        run: |
          cd packages/cache
          npm install --legacy-peer-deps --ignore-scripts
          npm publish --access public --otp ${{ secrets.NPM_OTP }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Publish @structa/queue
        run: |
          cd packages/queue
          npm install --legacy-peer-deps --ignore-scripts
          npm publish --access public --otp ${{ secrets.NPM_OTP }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Publish @structa/mail
        run: |
          cd packages/mail
          npm install --legacy-peer-deps --ignore-scripts
          npm publish --access public --otp ${{ secrets.NPM_OTP }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Publish @structa/graphql
        run: |
          cd packages/graphql
          npm install --legacy-peer-deps --ignore-scripts
          npm run build
          npm publish --access public --otp ${{ secrets.NPM_OTP }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Publish @structa/websockets
        run: |
          cd packages/websockets
          npm install --legacy-peer-deps --ignore-scripts
          npm run build
