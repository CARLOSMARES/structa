name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.0)'
        required: false
  push:
    tags:
      - '@structa/*@*'

jobs:
  # Publish @structa/* packages to npm
  # Note: @structa/cli is published via the Release workflow (cargo-dist)
  publish-packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - { dir: 'runtime', name: '@structa/runtime' }
          - { dir: 'packages/http', name: '@structa/http' }
          - { dir: 'packages/graphql', name: '@structa/graphql' }
          - { dir: 'packages/websockets', name: '@structa/websockets' }
          - { dir: 'packages/swagger', name: '@structa/swagger' }
          - { dir: 'packages/testing', name: '@structa/testing' }
          - { dir: 'packages/orm', name: '@structa/orm' }
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@structa'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: ./${{ matrix.package.dir }}
      
      - name: Build
        run: npm run build
        working-directory: ./${{ matrix.package.dir }}
      
      - name: Publish ${{ matrix.package.name }} to npm
        run: npm publish --access public
        working-directory: ./${{ matrix.package.dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
